# Pre-training config for GAT (HPO-optimised)

train:
  num_epochs: 500
  lr: 5.703e-4
  weight_decay: 1.671e-4
  patience: 50
  task: regression
  seed: 42

model:
  input_dim: 74
  hidden_dim: 256
  output_dim: 1
  num_layers: 5
  dropout: 2.452e-2
  pooling: sigmoid_weighted
  activation: relu
  num_heads: 2

data:
  batch_size: 64
  num_workers: 2
  pin_memory: true
